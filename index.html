            .sidenav a{
                padding: 16px 16px 16px 16px;
                font-size: 14px;
                color: black;
                display: block;
            }
        
a:link {
  color: rgb(0, 0, 0);
  background-color: transparent;
  text-decoration: none;
}
a:visited {
  color: rgb(0, 0, 0);
  background-color: transparent;
  text-decoration: none;
}
a:hover {
  color: rgb(28, 36, 255);
  background-color: transparent;
  text-decoration: none;

                font-size: 20px;
                padding: 0px 50px;

            @media screen and (max-height: 450px) {
